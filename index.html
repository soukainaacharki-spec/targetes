  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Targeta Virtual - Fundacio MAP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #e8f4f8 0%, #d4eaf7 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      width: 100%;
      max-width: 400px;
      overflow: hidden;
    }
    .card-header {
      background: linear-gradient(135deg, #2c7bb6 0%, #1a5a8a 100%);
      padding: 36px 24px 36px;
      text-align: center;
    }
    .inicials {
      width: 80px; height: 80px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.8);
      margin: 0 auto 16px;
      background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 700; color: white;
    }
    .nom { color: white; font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .carrec { color: rgba(255,255,255,0.85); font-size: 14px; }
    .card-body { padding: 28px 24px 16px; }
    .info-item {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid #f0f4f8;
    }
    .info-item:last-of-type { border-bottom: none; }
    .info-icon {
      width: 40px; height: 40px;
      border-radius: 12px;
      background: #eaf4fb;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .info-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
    .info-value { font-size: 15px; color: #333; font-weight: 500; }
    .info-value a { color: #2c7bb6; text-decoration: none; }
    .card-footer {
      background: #f8fbfe;
      padding: 16px 24px;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      border-top: 1px solid #eef3f7;
    }
    .logo-map { height: 36px; width: auto; }
    .fundacio-text { font-size: 13px; color: #2c7bb6; font-weight: 500; }
    .loading { text-align: center; padding: 60px 20px; color: #666; font-size: 16px; }
    .error { text-align: center; padding: 60px 20px; color: #e74c3c; font-size: 16px; }
  </style>
</head>

    function parseCSV(text) {
      var lines = text.split("\n");
      var headers = lines[0].split(",").map(function(h){ return h.replace(/"/g,"").trim(); });
      return lines.slice(1).filter(function(l){ return l.trim(); }).map(function(line){
        var vals = [], cur = "", inQ = false;
        for (var i=0; i<line.length; i++) {
          var c = line[i];
          if (c==='"') inQ=!inQ;
          else if (c===',' && !inQ) { vals.push(cur.trim()); cur=""; }
          else cur+=c;
        }
        vals.push(cur.trim());
        var obj = {};
        headers.forEach(function(h,i){ obj[h]=(vals[i]||"").replace(/"/g,""); });
        return obj;
      });
    }

    function ini(nom) {
      return nom.split(" ").map(function(n){ return n[0]; }).filter(Boolean).slice(0,2).join("").toUpperCase();
    }

    function render(p) {
      var nom = p["Nom i Cognoms"]||"";
      var carrec = p["Carrec"]||p["Càrrec"]||"";
      var area = p["Departament / Àrea"]||"";
      var mail = p["Correu electrònic"]||"";
      var tel = p["Telèfon"]||"";

      var html = '<div class="card">';
      html += '<div class="card-header">';
      html += '<div class="inicials">'+ini(nom)+'</div>';
      html += '<div class="nom">'+nom+'</div>';
      html += '<div class="carrec">'+carrec+'</div>';
      html += '</div>';
      html += '<div class="card-body">';
      if(area) html += '<div class="info-item"><div class="info-icon">&#127962;</div><div><div class="info-label">Area</div><div class="info-value">'+area+'</div></div></div>';
      if(mail) html += '<div class="info-item"><div class="info-icon">&#9993;</div><div><div class="info-label">Correu electronic</div><div class="info-value"><a href="mailto:'+mail+'">'+mail+'</a></div></div></div>';
      if(tel) html += '<div class="info-item"><div class="info-icon">&#128222;</div><div><div class="info-label">Telefon</div><div class="info-value"><a href="tel:'+tel+'">'+tel+'</a></div></div></div>';
      html += '</div>';
      html += '<div class="card-footer"><img class="logo-map" src="'+LOGO+'"><span class="fundacio-text">&#10024; Persona activa de la Fundacio MAP</span></div>';
      html += '</div>';
      document.getElementById("app").innerHTML = html;
    }

    var id = new URLSearchParams(window.location.search).get("id")||"";
    if(!id) {
      document.getElementById("app").innerHTML='<div class="error">Cal especificar un ID (?id=correu)</div>';
    } else {
      fetch(CSV).then(function(r){ return r.text(); }).then(function(text){
        var rows = parseCSV(text);
        var p = rows.find(function(r){ return r["ID_Treballador"]&&r["ID_Treballador"].trim()===id.trim(); });
        if(p) render(p);
        else document.getElementById("app").innerHTML='<div class="error">Persona no trobada.</div>';
      }).catch(function(){
        document.getElementById("app").innerHTML='<div class="error">Error carregant les dades.</div>';
      });
    }
  </script>
